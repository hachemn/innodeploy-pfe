apiVersion: apps/v1
kind: Deployment
metadata:
  name: innodeploy-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: innodeploy
  template:
    metadata:
      labels:
        app: innodeploy
    spec:
      containers:
      - name: app
        image: nourhenhachem/innodeploy-app:v1777851660
        ports:
        - containerPort: 3000
        # 🔥 readiness check
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5

        # 🔥 liveness check
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1